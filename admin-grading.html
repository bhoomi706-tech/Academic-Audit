<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Grading - Academic Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="top-navbar">
                <button type="button" id="sidebarCollapse" class="btn btn-light d-md-none">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="mb-0">Admin Grading System</h4>
                <div class="notification-icon" onclick="showNotifications()">
                    <i class="bi bi-bell-fill"></i>
                    <span id="notification-badge" class="notification-badge bg-danger" style="display:none;">0</span>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-md-6">
                                <span>Grade Teachers</span>
                            </div>
                            <div class="col-md-6 text-end">
                                <select id="gradingDeptFilter" class="form-select form-select-sm d-inline-block w-auto">
                                    <option value="All">All Departments</option>
                                    <option value="CS-A">CS-A</option>
                                    <option value="CS-B">CS-B</option>
                                    <option value="CS-C">CS-C</option>
                                    <option value="CSE">CSE</option>
                                    <option value="ECS">ECS</option>
                                    <option value="MECH">MECH</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="list-group" id="gradingTeacherList">
                                    <!-- Populated by JS -->
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div id="gradingContainer" class="p-3 border rounded bg-light">
                                    <div class="text-center text-muted mt-4 mb-4">
                                        <i class="bi bi-person-lines-fill fs-1"></i>
                                        <p class="mt-2">Select a teacher to start grading</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Notifications</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0" id="notificationModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
