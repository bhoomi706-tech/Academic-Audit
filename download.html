<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4 text-center" style="max-width: 500px;">
        <h3 class="mb-3">Download Source Code</h3>
        <p class="text-muted mb-4">Click the button below to download the complete source code for the College Academic Audit System.</p>
        
        <button id="downloadBtn" class="btn btn-primary btn-lg">
            <span id="spinner" class="spinner-border spinner-border-sm me-2" style="display:none;"></span>
            Download .zip
        </button>
        
        <div id="status" class="mt-3 small text-muted"></div>
    </div>

    <script>
        const filesToDownload = [
            'index.html',
            'dashboard.html',
            'meetings.html',
            'syllabus.html',
            'attendance.html',
            'analysis.html',
            'audit.html',
            'scheduler.html',
            'style.css',
            'script.js'
        ];

        document.getElementById('downloadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('downloadBtn');
            const spinner = document.getElementById('spinner');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            status.innerText = 'Preparing files...';

            const zip = new JSZip();

            try {
                // Add README for XAMPP instructions
                zip.file("README.txt", `COLLEGE ACADEMIC AUDIT SYSTEM
=============================

HOW TO RUN WITH XAMPP:

1. Unzip this folder.
2. Copy the entire folder to your XAMPP "htdocs" directory.
   (Usually C:\\xampp\\htdocs\\academic-audit)
3. Open XAMPP Control Panel and start "Apache".
4. Open your browser and go to:
   http://localhost/academic-audit/index.html

HOW TO RUN WITHOUT XAMPP:

1. Simply double-click "index.html" to open it in your browser.
   (This project uses LocalStorage, so it works without a server too!)
`);

                for (const file of filesToDownload) {
                    status.innerText = `Fetching ${file}...`;
                    const response = await fetch(file);
                    if (!response.ok) throw new Error(`Failed to load ${file}`);
                    const content = await response.text();
                    zip.file(file, content);
                }

                status.innerText = 'Compressing...';
                const content = await zip.generateAsync({ type: 'blob' });
                saveAs(content, 'College_Academic_Audit_System.zip');
                
                status.innerText = 'Download started!';
                setTimeout(() => status.innerText = '', 3000);
            } catch (err) {
                status.innerText = 'Error: ' + err.message;
                console.error(err);
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
