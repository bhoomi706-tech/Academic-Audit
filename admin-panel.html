<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Academic Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-wrapper">
        <nav id="sidebar"></nav>
        <div id="content">
            <nav class="top-navbar">
                <button type="button" id="sidebarCollapse" class="btn btn-light d-md-none">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="mb-0">Admin Panel - Teacher Evaluation</h4>
                <div class="notification-icon" onclick="showNotifications()">
                    <i class="bi bi-bell-fill"></i>
                    <span id="notification-badge" class="notification-badge bg-danger" style="display:none;">0</span>
                </div>
            </nav>

            <div class="container-fluid">
                <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="grading-tab" data-bs-toggle="tab" data-bs-target="#grading-panel" type="button" role="tab">Criteria Grading</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="module-tab" data-bs-toggle="tab" data-bs-target="#module-panel" type="button" role="tab">Module Evaluation</button>
                    </li>
                </ul>

                <div class="tab-content" id="adminTabsContent">
                    <!-- Criteria Grading Tab -->
                    <div class="tab-pane fade show active" id="grading-panel" role="tabpanel">
                        <div class="card shadow-sm">
                            <div class="card-header bg-white">
                                <div class="row align-items-center">
                                    <div class="col-md-6">
                                        <h5 class="mb-0">Grade Teachers (Criteria-based)</h5>
                                    </div>
                                    <div class="col-md-6 text-end">
                                        <select id="gradingDeptFilter" class="form-select form-select-sm d-inline-block w-auto">
                                            <option value="All">All Departments</option>
                                            <option value="CS-A">CS-A</option>
                                            <option value="CS-B">CS-B</option>
                                            <option value="CS-C">CS-C</option>
                                            <option value="CSE">CSE</option>
                                            <option value="ECS">ECS</option>
                                            <option value="MECH">MECH</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="list-group" id="gradingTeacherList" style="max-height: 500px; overflow-y: auto;">
                                            <!-- Populated by JS -->
                                        </div>
                                    </div>
                                    <div class="col-md-8">
                                        <div id="gradingContainer" class="p-3 border rounded bg-light">
                                            <div class="text-center text-muted mt-4 mb-4">
                                                <i class="bi bi-person-lines-fill fs-1"></i>
                                                <p class="mt-2">Select a teacher to start grading</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Module Evaluation Tab -->
                    <div class="tab-pane fade" id="module-panel" role="tabpanel">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="card shadow-sm mb-4">
                                    <div class="card-header bg-white">
                                        <h5 class="mb-0">Select Teacher</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="mb-3">
                                            <label class="form-label">Filter by Department</label>
                                            <select id="deptFilter" class="form-select">
                                                <option value="All">All Departments</option>
                                                <option value="CS-A">CS-A</option>
                                                <option value="CS-B">CS-B</option>
                                                <option value="CS-C">CS-C</option>
                                                <option value="CSE">CSE</option>
                                                <option value="ECS">ECS</option>
                                                <option value="MECH">MECH</option>
                                            </select>
                                        </div>
                                        <div class="list-group" id="teacherList" style="max-height: 500px; overflow-y: auto;">
                                            <!-- Teachers will be listed here -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="card shadow-sm">
                                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                        <h5 class="mb-0">Evaluation Details</h5>
                                        <button id="generateCertBtn" class="btn btn-success btn-sm" style="display: none;"><i class="bi bi-award me-2"></i>Generate Certificate</button>
                                    </div>
                                    <div class="card-body" id="evaluationContainer">
                                        <div class="alert alert-info">Select a teacher from the list to begin evaluation.</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailsModalTitle">Audit Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailsModalBody">
                    <!-- Details will be loaded here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Notifications</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0" id="notificationModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
