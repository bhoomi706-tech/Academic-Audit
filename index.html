<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Academic Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-header">
        <div class="login-title">College Academic Audit System</div>
    </div>

    <div class="container">
        <div class="login-container">
            <h4 class="text-center mb-4">Faculty Login</h4>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="faculty@college.edu">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="******">
                </div>
                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="role" required>
                        <option value="Teacher">Teacher</option>
                        <option value="HOD">HOD</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <select class="form-select" id="department" required>
                        <option value="CS-A">CS-A</option>
                        <option value="CS-B">CS-B</option>
                        <option value="CS-C">CS-C</option>
                        <option value="CSE">CSE</option>
                        <option value="ECS">ECS</option>
                        <option value="MECH">MECH</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
