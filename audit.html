<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Audit - College System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="top-navbar">
                <button type="button" id="sidebarCollapse" class="btn btn-light d-md-none">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="mb-0">Academic Audit Modules</h4>
                <div class="notification-icon" onclick="showNotifications()">
                    <i class="bi bi-bell-fill"></i>
                    <span id="notification-badge" class="notification-badge bg-danger" style="display:none;">0</span>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row">
                    <!-- Left Panel: Module List -->
                    <div class="col-md-4 mb-4">
                        <div class="card shadow-sm h-100">
                            <div class="card-header bg-white border-bottom">
                                <h5 class="mb-0">Audit Modules</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="list-group list-group-flush audit-sidebar" id="auditModuleList">
                                    <!-- Populated by JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Panel: Content & Form -->
                    <div class="col-md-8">
                        <div class="card shadow-sm mb-4">
                            <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
                                <h5 class="mb-0" id="selectedModuleTitle">Select a Module</h5>
                                <span class="badge bg-secondary" id="moduleStatus">Not Started</span>
                            </div>
                            <div class="card-body">
                                <div id="auditFormContainer">
                                    <div class="text-center py-5 text-muted">
                                        <i class="bi bi-arrow-left-circle display-4"></i>
                                        <p class="mt-3">Select a module from the left list to begin auditing.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Comments Section -->
                        <div class="card shadow-sm" id="auditCommentsSection" style="display: none;">
                            <div class="card-header bg-light">
                                <h6 class="mb-0"><i class="bi bi-chat-left-text me-2"></i>Comments & Remarks</h6>
                            </div>
                            <div class="card-body">
                                <div id="moduleCommentsList" class="mb-3" style="max-height: 300px; overflow-y: auto;">
                                    <!-- Comments populated here -->
                                </div>
                                <form id="moduleCommentForm">
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="moduleCommentInput" placeholder="Add a remark or observation..." required>
                                        <button class="btn btn-primary" type="submit">Post</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Notifications</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0" id="notificationModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
