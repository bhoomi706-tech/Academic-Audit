<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Audit Certificate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .certificate-container { border: none !important; box-shadow: none !important; padding: 0 !important; }
        }
        body {
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .certificate-container {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 50px;
            border: 15px solid #0d6efd;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            text-align: center;
        }
        .cert-header {
            margin-bottom: 40px;
        }
        .cert-college {
            font-size: 2.5rem;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .cert-title {
            font-size: 2rem;
            color: #333;
            font-weight: 600;
            letter-spacing: 2px;
            border-bottom: 2px solid #0d6efd;
            display: inline-block;
            padding-bottom: 10px;
        }
        .cert-body {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .cert-name {
            font-size: 2rem;
            font-weight: bold;
            color: #000;
            text-decoration: underline;
            margin: 10px 0;
        }
        .cert-stats {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }
        .stat-box {
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #0d6efd;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
            text-transform: uppercase;
        }
        .cert-remarks {
            text-align: left;
            background: #fff;
            padding: 20px;
            border-left: 4px solid #0d6efd;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .cert-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 60px;
            padding-top: 20px;
        }
        .signature-line {
            width: 200px;
            border-top: 1px solid #000;
            padding-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container d-flex flex-column align-items-center">
        <div class="mb-4 no-print w-100 text-center">
            <button class="btn btn-primary btn-lg shadow" onclick="window.print()">
                <i class="bi bi-printer me-2"></i> Download Certificate (PDF)
            </button>
            <a href="dashboard.html" class="btn btn-outline-secondary btn-lg ms-2 shadow">Back to Dashboard</a>
        </div>

        <div class="certificate-container" id="certificateContent">
            <!-- Populated by JS -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const user = getCurrentUser();
            
            // If no email provided, use current user's email
            const targetEmail = email || (user ? user.email : null);
            
            if (!targetEmail) {
                document.getElementById('certificateContent').innerHTML = '<div class="alert alert-danger">No user specified.</div>';
                return;
            }

            const users = getStorage(STORAGE_KEYS.USERS, []);
            const targetUser = users.find(u => u.email === targetEmail);
            
            if (!targetUser) {
                document.getElementById('certificateContent').innerHTML = '<div class="alert alert-danger">User not found.</div>';
                return;
            }

            // Get grading data
            const gradingData = getStorage('cad_grading', {});
            const teacherGrading = gradingData[targetEmail];

            if (!teacherGrading) {
                document.getElementById('certificateContent').innerHTML = '<div class="alert alert-warning">Grading not completed yet.</div>';
                return;
            }

            const totalMarks = teacherGrading.totalMarks || 0;
            const percentage = teacherGrading.percentage || 0;
            const remarks = teacherGrading.overallRemarks || 'Good performance.';
            const suggestions = teacherGrading.improvementSuggestions || 'Keep up the good work.';

            // Calculate marks out of 1000 (since max is 45, (total / 45) * 1000)
            const marksOutOf1000 = Math.round((totalMarks / 45) * 1000);

            const html = `
                <div class="cert-header">
                    <div class="cert-college">Global Institute of Technology</div>
                    <div class="cert-title">Academic Audit Certificate</div>
                </div>
                
                <div class="cert-body">
                    This is to certify that
                    <div class="cert-name">${targetUser.name}</div>
                    from the Department of <strong>${targetUser.department}</strong> has successfully completed the Academic Audit for the current academic year.
                </div>

                <div class="cert-stats">
                    <div class="stat-box">
                        <div class="stat-value">${marksOutOf1000} / 1000</div>
                        <div class="stat-label">Total Marks</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value ${percentage < 40 ? 'text-danger' : 'text-success'}">${percentage}%</div>
                        <div class="stat-label">Percentage</div>
                    </div>
                </div>

                <div class="cert-remarks">
                    <h5 class="mb-2 text-primary">Evaluation Remarks</h5>
                    <p class="mb-2"><strong>Remarks:</strong> ${remarks}</p>
                    <p class="mb-0"><strong>Improvement Suggestions:</strong> ${suggestions}</p>
                </div>

                <div class="cert-footer">
                    <div class="signature-box">
                        <div class="signature-line">Head of Department</div>
                    </div>
                    <div class="signature-box">
                        <div class="signature-line">Principal / Admin</div>
                    </div>
                </div>
            `;

            document.getElementById('certificateContent').innerHTML = html;
        });
    </script>
</body>
</html>
