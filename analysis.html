<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis - Academic Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <nav id="sidebar"></nav>

        <div id="content">
            <nav class="top-navbar">
                <button type="button" id="sidebarCollapse" class="btn btn-light d-md-none">
                    <i class="bi bi-list"></i>
                </button>
                <h4 class="mb-0">Performance Analysis</h4>
                <div class="notification-icon" onclick="showNotifications()">
                    <i class="bi bi-bell-fill"></i>
                    <span id="notification-badge" class="notification-badge bg-danger" style="display:none;">0</span>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="card h-100">
                            <div class="card-body text-center d-flex flex-column justify-content-center">
                                <h5 class="card-title mb-4">Overall Performance</h5>
                                <div id="overallPerformance" class="performance-indicator mb-3">0%</div>
                                <p class="text-muted small">Average of Meetings, Syllabus & Attendance</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card h-100">
                            <div class="card-body">
                                <div class="row text-center mb-4">
                                    <div class="col-4">
                                        <h6 class="text-muted text-uppercase small">Meetings</h6>
                                        <h3 id="anMeeting" class="text-primary">0%</h3>
                                    </div>
                                    <div class="col-4">
                                        <h6 class="text-muted text-uppercase small">Syllabus</h6>
                                        <h3 id="anSyllabus" class="text-success">0%</h3>
                                    </div>
                                    <div class="col-4">
                                        <h6 class="text-muted text-uppercase small">Attendance</h6>
                                        <h3 id="anAttendance" class="text-warning">0%</h3>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="chart-container" style="height: 200px;">
                                            <canvas id="analysisRadarChart"></canvas>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="chart-container" style="height: 200px;">
                                            <canvas id="analysisDonutChart"></canvas>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">Comments & Feedback</h5>
                            </div>
                            <div class="card-body">
                                <form id="commentForm" class="mb-4">
                                    <div class="input-group">
                                        <input type="text" class="form-control" id="commentText" placeholder="Add a comment or observation..." required>
                                        <button class="btn btn-primary" type="submit">Post Comment</button>
                                    </div>
                                </form>
                                <div id="commentList" style="max-height: 400px; overflow-y: auto;">
                                    <!-- Comments here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Notifications</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0" id="notificationModalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
